<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Analysis - PneumoDetect AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">P</div>
                <div class="logo-text">
                    <h2>PneumoDetect</h2>
                    <p>AI Platform</p>
                </div>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/dashboard.png') }}" alt="Dashboard"></span>Dashboard</a>
                <a href="{{ url_for('new_analysis') }}" id="newAnalysisLink" class="active"><span class="nav-icon"><img src="{{ url_for('static', filename='images/upload.png') }}" alt="New Analysis"></span>New Analysis</a>
                <a href="{{ url_for('report') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/history.png') }}" alt="Patient History"></span>Patient History</a>
                <a href="{{ url_for('management') }}" id="managementLink" style="display: none;"><span class="nav-icon"><img src="{{ url_for('static', filename='images/management.png') }}" alt="Management"></span>Management</a>
                <a href="{{ url_for('alerts') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/alerts.png') }}" alt="Alerts"></span>Alerts</a>
            </nav>
            <div class="user-info">
                <div class="user-avatar" id="userAvatarInitials">--</div>
                <div class="user-details">
                    <h3 id="userName">Loading...</h3>
                    <p id="userEmail">...</p>
                    <span id="userRole" style="display: block; font-size: 12px; color: #667eea; margin-top: 4px; text-transform: capitalize">--</span>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <h1>New Analysis</h1>
                <p>Upload and analyze chest X-ray images for pneumonia detection</p>
            </div>

            <div class="content-wrapper centered-content">
                <div class="stepper" aria-hidden="false">
                    <div class="step active">
                        <div class="circle">1</div>
                        <div class="label">Patient Info</div>
                    </div>
                    <div class="step-sep"></div>
                    <div class="step">
                        <div class="circle">2</div>
                        <div class="label">Upload X-Ray</div>
                    </div>
                    <div class="step-sep"></div>
                    <div class="step">
                        <div class="circle">3</div>
                        <div class="label">Results</div>
                    </div>
                </div>

                <div class="card">
                    <h3>Patient Information</h3>
                    <p>Enter patient details</p>

                    <div class="form-row">
                        <label for="patient-name">Patient Name</label>
                        <input id="patient-name" placeholder="Enter patient name">
                    </div>

                    <div class="form-row">
                        <label for="age">Age</label>
                        <input id="age" placeholder="Enter age">
                    </div>

                    <div class="form-row">
                        <label for="medical-id">Medical ID</label>
                        <input id="medical-id" placeholder="Enter medical ID">
                    </div>

                    <div class="cta">
                        <a class="btn btn-primary" href="{{ url_for('new_analysis_upload') }}" id="continueLink">Continue to X-Ray Upload</a>
                    </div>

    <script>
        // Load patient data from sessionStorage on page load
        // sessionStorage persists during navigation but clears on page refresh
        (function(){
            const savedName = sessionStorage.getItem('patient_name');
            const savedAge = sessionStorage.getItem('patient_age');
            const savedMedicalId = sessionStorage.getItem('patient_medical_id');

            if(savedName) document.getElementById('patient-name').value = savedName;
            if(savedAge) document.getElementById('age').value = savedAge;
            if(savedMedicalId) document.getElementById('medical-id').value = savedMedicalId;
        })();

        document.getElementById('continueLink').addEventListener('click', function(e){
            e.preventDefault();
            const name = document.getElementById('patient-name').value.trim();
            const age = document.getElementById('age').value.trim();
            const medicalId = document.getElementById('medical-id').value.trim();

            if(!name || !age || !medicalId){
                alert('Please fill in all patient information fields');
                return;
            }

            // Store patient info in sessionStorage
            sessionStorage.setItem('patient_name', name);
            sessionStorage.setItem('patient_age', age);
            sessionStorage.setItem('patient_medical_id', medicalId);

            // Navigate to step 2
            window.location.href = '{{ url_for("new_analysis_upload") }}';
        });

        // Load current user information
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const result = await response.json();
                
                if (result.success && result.user) {
                    const user = result.user;
                    
                    // Update user avatar (initials)
                    const names = user.name.split(' ');
                    const initials = names.map(n => n[0]).join('').toUpperCase();
                    document.getElementById('userAvatarInitials').textContent = initials;
                    
                    // Update user details
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('userRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
                    
                    // Update navigation based on role
                    if (user.role === 'admin') {
                        document.getElementById('newAnalysisLink').style.display = 'none';
                        document.getElementById('managementLink').style.display = 'flex';
                    } else {
                        document.getElementById('newAnalysisLink').style.display = 'flex';
                        document.getElementById('managementLink').style.display = 'none';
                    }
                } else {
                    // Not logged in, redirect to login
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login.html';
            }
        }

        // Handle logout
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            if (confirm('Are you sure you want to logout?')) {
                try {
                    const response = await fetch('/api/logout', {
                        method: 'POST'
                    });
                    const result = await response.json();
                    if (result.success) {
                        window.location.href = '/login.html';
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                    alert('Error logging out. Please try again.');
                }
            }
        });

        // Load user info on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
        });
    </script>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
