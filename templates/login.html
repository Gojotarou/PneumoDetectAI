<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PneumoDetect AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center }
        .login-wrapper { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center }
        .login-container { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 48px 40px; max-width: 420px; width: 100%; margin: 20px }
        .login-container h1 { font-size: 28px; color: #2c3e50; margin: 0 0 8px; text-align: center; font-weight: 700 }
        .login-container .subtitle { color: #95a5a6; text-align: center; margin-bottom: 32px; font-size: 14px }
        .form-group { margin-bottom: 20px }
        .form-group label { display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px; font-size: 14px }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #e9ecef; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.2s }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1) }
        .btn-login { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3) }
        .btn-login:active { transform: translateY(0) }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed }
        .error-message { color: #dc3545; font-size: 13px; margin-top: 8px; text-align: center; display: none }
        .success-message { color: #28a745; font-size: 13px; margin-top: 8px; text-align: center; display: none }
        .demo-credentials { background: #f8f9fa; border-left: 4px solid #667eea; padding: 16px; border-radius: 8px; margin-top: 24px; font-size: 13px }
        .demo-credentials h4 { margin: 0 0 12px; color: #2c3e50; font-weight: 600 }
        .demo-credentials p { margin: 6px 0; color: #6c757d }
        .demo-credentials code { background: white; padding: 4px 8px; border-radius: 4px; font-family: monospace; color: #764ba2 }
        .loading { display: none; text-align: center }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <h1>PneumoDetect</h1>
            <p class="subtitle">AI-Powered Pneumonia Detection System</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="error-message" id="errorMsg"></div>
                <div class="success-message" id="successMsg"></div>

                <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 12px; color: #667eea">Logging in...</p>
                </div>
            </form>

            <div class="demo-credentials">
                <h4>Demo Credentials</h4>
                <p><strong>Admin:</strong> admin@pneumodetect.com / admin123</p>
                <p><strong>Doctor:</strong> doctor@pneumodetect.com / doctor123</p>
                <p><strong>Nurse:</strong> nurse@pneumodetect.com / nurse123</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            // Clear messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validation
            if (!email || !password) {
                errorMsg.textContent = 'Please enter email and password';
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading
            loginBtn.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    successMsg.textContent = 'Login successful! Redirecting...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                } else {
                    errorMsg.textContent = result.error || 'Login failed. Please try again.';
                    errorMsg.style.display = 'block';
                    loginBtn.style.display = 'block';
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
                loginBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
